<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Italiano: 50 Verbi v1.5</title>
    <style>
        :root {
            --ita-green: #008C45;
            --ita-white: #F4F5F0;
            --ita-red: #CD212A;
            --dark-blue: #2d3436;
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            min-height: 100vh; background-color: var(--ita-white); margin: 0;
            border-top: 8px solid var(--ita-green);
            border-bottom: 8px solid var(--ita-red);
            padding: 15px;
        }

        #stats { margin-bottom: 10px; font-weight: bold; color: var(--dark-blue); font-size: 0.8em; letter-spacing: 1px; }

        #controls { 
            margin-bottom: 20px; display: flex; gap: 8px; width: 100%; max-width: 400px; justify-content: center; 
        }

        .toggle-btn { 
            flex: 1; padding: 12px 5px; background: white; color: #555; border: 1px solid #ccc; 
            border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.75em; 
        }

        .active-mode { background: var(--ita-green); color: white; border-color: var(--ita-green); }

        #card { 
            width: 100%; max-width: 400px; min-height: 480px; background: white; border-radius: 16px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); display: flex; flex-direction: column; 
            align-items: center; padding: 30px 20px; text-align: center; border: 1px solid #eee;
            position: relative;
        }

        h2 { color: var(--dark-blue); margin: 0; font-size: 1.8em; border-bottom: 2px solid var(--ita-green); padding-bottom: 5px; width: 100%; }

        .audio-btn {
            background: #f8f9fa; border: 1px solid #ddd; border-radius: 50%;
            width: 50px; height: 50px; cursor: pointer; margin-top: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4em; -webkit-tap-highlight-color: transparent;
        }

        .prompt-text { font-size: 1.4em; margin: 25px 0; color: #333; line-height: 1.4; }
        .highlight { color: var(--ita-red); font-weight: bold; border-bottom: 2px solid #ddd; }
        
        #quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .quiz-btn { 
            padding: 18px 10px; border: 2px solid #eee; border-radius: 10px; background: white; 
            cursor: pointer; font-size: 1em; font-weight: bold; -webkit-tap-highlight-color: transparent;
        }

        .correct { background: var(--ita-green) !important; color: white; border-color: var(--ita-green); }
        .wrong { background: var(--ita-red) !important; color: white; border-color: var(--ita-red); }

        .primary-btn { 
            padding: 16px; background: var(--dark-blue); color: white; width: 100%; 
            margin-top: 25px; border-radius: 10px; border: none; font-weight: bold; font-size: 1.1em;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
        }

        #feedback { margin-top: 15px; font-weight: 900; color: var(--ita-green); height: 20px; font-size: 0.9em; }
        .mistake-badge { color: var(--ita-red); font-size: 0.7em; font-weight: bold; margin-top: 8px; display: none; }
        
        /* Table Layout - Responsive */
        .conjugation-row { 
            display: flex; flex-wrap: wrap; justify-content: space-between; width: 100%; gap: 15px; margin-top: 10px; 
        }
        .table-col { flex: 1; min-width: 120px; display: flex; flex-direction: column; gap: 12px; text-align: left; font-size: 1em; }

        #reset-link { margin-top: 25px; font-size: 0.7em; color: #bbb; cursor: pointer; padding: 10px; }

        /* Mobile specific font tweaks */
        @media (max-width: 360px) {
            h2 { font-size: 1.5em; }
            .prompt-text { font-size: 1.2em; }
            .quiz-btn { padding: 12px 5px; font-size: 0.9em; }
        }
    </style>
</head>
<body>

    <div id="stats">STREAK: <span id="streak">0</span> | ERRORS: <span id="bank-count">0</span></div>

    <div id="controls">
        <button class="toggle-btn" id="modeA" onclick="setMode('A')">TABLE</button>
        <button class="toggle-btn" id="modeB" onclick="setMode('B')">FLASH</button>
        <button class="toggle-btn" id="modeC" onclick="setMode('C')">QUIZ</button>
    </div>

    <div id="card">
        <div class="mode-indicator" id="mode-text">...</div>
        <h2 id="verb-display">...</h2>
        <button class="audio-btn" onclick="speakCurrent()" title="Listen">🔊</button>
        <div id="mistake-msg" class="mistake-badge">⚠️ REVIEWING MISTAKE</div>
        
        <div id="prompt-area" class="prompt-text">
            <span id="subject-text">Io</span> <span class="highlight" id="verb-blank">____</span>
        </div>
        
        <div id="answer-area" style="display: none; width: 100%;">
            <div id="table-view" class="conjugation-row">
                <div class="table-col" id="col-singular"></div>
                <div class="table-col" id="col-plural"></div>
            </div>
            <div id="single-view" style="font-size: 1.8em; color: var(--ita-green); font-weight: 900; margin-top: 15px;"></div>
        </div>

        <div id="quiz-options" style="display: none;"></div>
        <div id="feedback"></div>

        <button class="primary-btn" onclick="handleMainAction()" id="main-btn">SHOW ANSWER</button>
    </div>

    <div id="reset-link" onclick="resetAppData()">Reset all progress</div>

    <script>
        const verbs = [
            { inf: "Essere (be)", io: "sono", tu: "sei", lui: "è", noi: "siamo", voi: "siete", loro: "sono" },
            { inf: "Avere (have)", io: "ho", tu: "hai", lui: "ha", noi: "abbiamo", voi: "avete", loro: "hanno" },
            { inf: "Volere (want)", io: "voglio", tu: "vuoi", lui: "vuole", noi: "vogliamo", voi: "volete", loro: "vogliono" },
            { inf: "Potere (can)", io: "posso", tu: "puoi", lui: "può", noi: "possiamo", voi: "potete", loro: "possono" },
            { inf: "Dovere (must)", io: "devo", tu: "devi", lui: "deve", noi: "dobbiamo", voi: "dovete", loro: "devono" },
            { inf: "Andare (go)", io: "vado", tu: "vai", lui: "fa", noi: "andiamo", voi: "andate", loro: "vanno" },
            { inf: "Fare (do/make)", io: "faccio", tu: "fai", lui: "fa", noi: "facciamo", voi: "fate", loro: "fanno" },
            { inf: "Dire (say)", io: "dico", tu: "dici", lui: "dice", noi: "diciamo", voi: "dite", loro: "dicono" },
            { inf: "Venire (come)", io: "vengo", tu: "vieni", lui: "viene", noi: "veniamo", voi: "venite", loro: "vengono" },
            { inf: "Sapere (know)", io: "so", tu: "sai", lui: "sa", noi: "sappiamo", voi: "sapete", loro: "sanno" },
            { inf: "Parlare (speak)", io: "parlo", tu: "parli", lui: "parla", noi: "parliamo", voi: "parlate", loro: "parlano" },
            { inf: "Mangiare (eat)", io: "mangio", tu: "mangi", lui: "mangia", noi: "mangiamo", voi: "mangiate", loro: "mangiano" },
            { inf: "Vedere (see)", io: "vedo", tu: "vedi", lui: "vede", noi: "vediamo", voi: "vedete", loro: "vedono" },
            { inf: "Prendere (take)", io: "prendo", tu: "prendi", lui: "prende", noi: "prendiamo", voi: "prendete", loro: "prendono" },
            { inf: "Sentire (hear/feel)", io: "sento", tu: "senti", lui: "sente", noi: "sentiamo", voi: "sentite", loro: "sentono" },
            { inf: "Partire (leave)", io: "parto", tu: "parti", lui: "parte", noi: "partiamo", voi: "partite", loro: "partono" },
            { inf: "Lavorare (work)", io: "lavoro", tu: "lavori", lui: "lavora", noi: "lavoriamo", voi: "lavorate", loro: "lavorano" },
            { inf: "Aspettare (wait)", io: "aspetto", tu: "aspetti", lui: "aspetta", noi: "aspettiamo", voi: "aspettate", loro: "aspettano" },
            { inf: "Capire (understand)", io: "capisco", tu: "capisci", lui: "capisce", noi: "capiamo", voi: "capite", loro: "capiscono" },
            { inf: "Finire (finish)", io: "finisco", tu: "finisci", lui: "finisce", noi: "finiamo", voi: "finite", loro: "finiscono" },
            { inf: "Scrivere (write)", io: "scrivo", tu: "scrivi", lui: "scrive", noi: "scriviamo", voi: "scrivete", loro: "scrivono" },
            { inf: "Leggere (read)", io: "leggo", tu: "leggi", lui: "legge", noi: "leggiamo", voi: "leggete", loro: "leggono" },
            { inf: "Chiamare (call)", io: "chiamo", tu: "chiami", lui: "chiama", noi: "chiamiamo", voi: "chiamate", loro: "chiamano" },
            { inf: "Cercare (look for)", io: "cerco", tu: "cerchi", lui: "cerca", noi: "cerchiamo", voi: "cercate", loro: "cercano" },
            { inf: "Trovare (find)", io: "trovo", tu: "trovi", lui: "trova", noi: "troviamo", voi: "trovate", loro: "trovano" },
            { inf: "Dare (give)", io: "do", tu: "dai", lui: "dà", noi: "diamo", voi: "date", loro: "danno" },
            { inf: "Stare (stay/be)", io: "sto", tu: "stai", lui: "sta", noi: "stiamo", voi: "state", loro: "stanno" },
            { inf: "Uscire (go out)", io: "esco", tu: "esci", lui: "esce", noi: "usciamo", voi: "uscite", loro: "escono" },
            { inf: "Credere (believe)", io: "credo", tu: "credi", lui: "crede", noi: "crediamo", voi: "credete", loro: "credono" },
            { inf: "Portare (bring)", io: "porto", tu: "porti", lui: "porta", noi: "portiamo", voi: "portate", loro: "portano" },
            { inf: "Mettere (put)", io: "metto", tu: "metti", lui: "mette", noi: "mettiamo", voi: "mettete", loro: "mettono" },
            { inf: "Comprare (buy)", io: "compro", tu: "compri", lui: "compra", noi: "compriamo", voi: "comprate", loro: "comprano" },
            { inf: "Vendere (sell)", io: "vendo", tu: "vendi", lui: "vende", noi: "vendiamo", voi: "vendete", loro: "vendono" },
            { inf: "Vivere (live)", io: "vivo", tu: "vivi", lui: "vive", noi: "viviamo", voi: "vivete", loro: "vivono" },
            { inf: "Chiedere (ask)", io: "chiedo", tu: "chiedi", lui: "chiede", noi: "chiediamo", voi: "chiedete", loro: "chiedono" },
            { inf: "Rispondere (answer)", io: "rispondo", tu: "rispondi", lui: "risponde", noi: "rispondiamo", voi: "rispondete", loro: "rispondono" },
            { inf: "Guardare (watch)", io: "guardo", tu: "guardi", lui: "guarda", noi: "guardiamo", voi: "guardate", loro: "guardano" },
            { inf: "Ascoltare (listen)", io: "ascolto", tu: "ascolti", lui: "ascolta", noi: "ascoltiamo", voi: "ascoltate", loro: "ascoltano" },
            { inf: "Studiare (study)", io: "studio", tu: "studi", lui: "studia", noi: "studiamo", voi: "studiate", loro: "studiano" },
            { inf: "Dormire (sleep)", io: "dormo", tu: "dormi", lui: "dorme", noi: "dormiamo", voi: "dormite", loro: "dormono" },
            { inf: "Aprire (open)", io: "apro", tu: "apri", lui: "apre", noi: "apriamo", voi: "aprite", loro: "aprono" },
            { inf: "Chiudere (close)", io: "chiudo", tu: "chiudi", lui: "chiude", noi: "chiudiamo", voi: "chiudete", loro: "chiudono" },
            { inf: "Arrivare (arrive)", io: "arrivo", tu: "arrivi", lui: "arriva", noi: "arriviamo", voi: "arrivate", loro: "arrivano" },
            { inf: "Tornare (return)", io: "torno", tu: "torni", lui: "torna", noi: "torniamo", voi: "tornate", loro: "tornano" },
            { inf: "Camminare (walk)", io: "cammino", tu: "cammini", lui: "cammina", noi: "camminiamo", voi: "camminate", loro: "camminano" },
            { inf: "Correre (run)", io: "corro", tu: "corri", lui: "corre", noi: "corriamo", voi: "correte", loro: "corrono" },
            { inf: "Piacere (like)", io: "piaccio", tu: "piaci", lui: "piace", noi: "piacciamo", voi: "piacete", loro: "piacciono" },
            { inf: "Pagare (pay)", io: "pago", tu: "paghi", lui: "paga", noi: "paghiamo", voi: "pagate", loro: "pagano" },
            { inf: "Giocare (play)", io: "gioco", tu: "giochi", lui: "gioca", noi: "giochiamo", voi: "giocate", loro: "giocano" }
        ];

        let mistakeBank = [];
        let currentVerb = {};
        let currentMode = 'A';
        let currentSubject = 'io';
        let streak = 0;

        function saveData() {
            const data = { streak, mistakeBank, lastMode: currentMode };
            localStorage.setItem('italianApp_progress', JSON.stringify(data));
        }

        function loadData() {
            const saved = localStorage.getItem('italianApp_progress');
            if (saved) {
                const data = JSON.parse(saved);
                streak = data.streak || 0;
                mistakeBank = data.mistakeBank || [];
                currentMode = data.lastMode || 'A';
                document.getElementById('streak').innerText = streak;
                document.getElementById('bank-count').innerText = mistakeBank.length;
            }
            setMode(currentMode);
        }

        function resetAppData() {
            if(confirm("Delete all progress?")) {
                localStorage.removeItem('italianApp_progress');
                location.reload();
            }
        }

        function speakCurrent() {
            const utterance = new SpeechSynthesisUtterance();
            utterance.lang = 'it-IT';
            const rawInf = currentVerb.inf.split(' ')[0];
            if (currentMode === 'A' && document.getElementById('answer-area').style.display !== 'none') {
                utterance.text = `${rawInf}. io ${currentVerb.io}, tu ${currentVerb.tu}, lui ${currentVerb.lui}, noi ${currentVerb.noi}, voi ${currentVerb.voi}, loro ${currentVerb.loro}`;
            } else if (currentMode === 'C' || currentMode === 'B') {
                utterance.text = currentVerb[currentSubject === 'lui' ? 'lui' : currentSubject];
            } else {
                utterance.text = rawInf;
            }
            window.speechSynthesis.speak(utterance);
        }

        function setMode(mode) {
            currentMode = mode;
            ['modeA', 'modeB', 'modeC'].forEach(id => document.getElementById(id).classList.remove('active-mode'));
            document.getElementById('mode' + mode).classList.add('active-mode');
            const labels = {'A': 'TABLE', 'B': 'FLASHCARD', 'C': 'QUIZ'};
            document.getElementById('mode-text').innerText = 'MODE: ' + labels[mode];
            saveData();
            nextQuestion();
        }

        function nextQuestion() {
            if (mistakeBank.length > 0 && Math.random() < 0.4) {
                const mIndex = Math.floor(Math.random() * mistakeBank.length);
                const mistake = mistakeBank[mIndex];
                currentVerb = mistake.verb;
                currentSubject = mistake.sub;
                document.getElementById('mistake-msg').style.display = 'block';
            } else {
                currentVerb = verbs[Math.floor(Math.random() * verbs.length)];
                currentSubject = ['io', 'tu', 'lui', 'noi', 'voi', 'loro'][Math.floor(Math.random() * 6)];
                document.getElementById('mistake-msg').style.display = 'none';
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('verb-display').innerText = currentVerb.inf;
            document.getElementById('feedback').innerText = '';
            document.getElementById('answer-area').style.display = 'none';
            document.getElementById('quiz-options').style.display = 'none';
            document.getElementById('bank-count').innerText = mistakeBank.length;
            document.getElementById('prompt-area').style.display = (currentMode === 'A') ? 'none' : 'block';
            document.getElementById('subject-text').innerText = currentSubject.charAt(0).toUpperCase() + (currentSubject === 'lui' ? '/Lei' : currentSubject.slice(1));
            
            if (currentMode === 'C') {
                document.getElementById('main-btn').style.display = 'none';
                setupQuiz();
            } else {
                document.getElementById('main-btn').style.display = 'block';
                document.getElementById('main-btn').innerText = "SHOW ANSWER";
            }
        }

        function setupQuiz() {
            const optionsArea = document.getElementById('quiz-options');
            optionsArea.style.display = 'grid';
            optionsArea.innerHTML = '';
            const correctKey = currentSubject === 'lui' ? 'lui' : currentSubject;
            const correctValue = currentVerb[correctKey];
            let choices = [...new Set(['io','tu','lui','noi','voi','loro'].map(s => currentVerb[s]))].sort(() => 0.5 - Math.random()).slice(0, 4);
            if (!choices.includes(correctValue)) choices[0] = correctValue;
            choices.sort(() => 0.5 - Math.random());
            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'quiz-btn';
                btn.innerText = choice;
                btn.onclick = () => {
                    if (choice === correctValue) {
                        btn.classList.add('correct');
                        streak++;
                        document.getElementById('streak').innerText = streak;
                        document.getElementById('feedback').innerText = "BENISSIMO!";
                        saveData();
                        setTimeout(nextQuestion, 1000);
                    } else {
                        btn.classList.add('wrong');
                        streak = 0;
                        document.getElementById('streak').innerText = streak;
                        document.getElementById('feedback').innerText = "RIPROVA!";
                        const alreadyIn = mistakeBank.find(m => m.verb.inf === currentVerb.inf && m.sub === currentSubject);
                        if (!alreadyIn) mistakeBank.push({verb: currentVerb, sub: currentSubject});
                        saveData();
                    }
                };
                optionsArea.appendChild(btn);
            });
        }

        function handleMainAction() {
            const btn = document.getElementById('main-btn');
            if (btn.innerText === "NEXT →") return nextQuestion();
            document.getElementById('answer-area').style.display = 'block';
            if (currentMode === 'A') {
                document.getElementById('single-view').style.display = 'none';
                document.getElementById('table-view').style.display = 'flex';
                document.getElementById('col-singular').innerHTML = `
                    <div><b style="color:var(--ita-green)">io</b> ${currentVerb.io}</div>
                    <div><b style="color:var(--ita-green)">tu</b> ${currentVerb.tu}</div>
                    <div><b style="color:var(--ita-green)">lui/lei</b> ${currentVerb.lui}</div>`;
                document.getElementById('col-plural').innerHTML = `
                    <div><b style="color:var(--ita-green)">noi</b> ${currentVerb.noi}</div>
                    <div><b style="color:var(--ita-green)">voi</b> ${currentVerb.voi}</div>
                    <div><b style="color:var(--ita-green)">loro</b> ${currentVerb.loro}</div>`;
            } else {
                document.getElementById('table-view').style.display = 'none';
                document.getElementById('single-view').style.display = 'block';
                document.getElementById('single-view').innerText = currentVerb[currentSubject === 'lui' ? 'lui' : currentSubject];
            }
            btn.innerText = "NEXT →";
        }

        loadData();
    </script>
</body>
</html>
